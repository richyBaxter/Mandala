# Deploys the static site to GitHub Pages and (best-effort) generates the AI
# market note via GitHub Models at build time. Enable Pages with
# "Source: GitHub Actions" in repo Settings -> Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"   # refresh the live note + redeploy every 6h
  workflow_dispatch:

permissions:
  contents: write           # commit the refreshed JSON + SVG back so the repo preview matches live
  pages: write
  id-token: write
  models: read              # GitHub Models inference (preview)

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh real monthly prices (Binance)
        continue-on-error: true
        run: python3 tools/update_prices.py
      - name: Regenerate SVG from data
        run: python3 generate.py
      - name: Fetch institutional news (server-side RSS)
        continue-on-error: true
        run: python3 tools/fetch_news.py
      - name: Fetch BTC ETF flows (Farside)
        continue-on-error: true
        run: python3 tools/fetch_etf_flows.py
      - name: Refresh maritime chokepoints (IMF PortWatch)
        continue-on-error: true
        run: python3 dashboards/maritime/fetch.py
      - name: Build AI prompt from live data
        run: python3 tools/build_prompt.py
      - name: Generate market note (GitHub Models)
        id: ai
        continue-on-error: true        # preview API — never block the deploy
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1-mini
          system-prompt: "You are a calm, plain-spoken Bitcoin market analyst writing for a smart but non-expert reader. You are given pre-computed signals and must use only those numbers, never inventing or predicting figures. Write 3-4 sentences: where price sits versus the long-term Power-Law model, the recent trajectory, one historical base rate if provided, and a measured stance (accumulate / neutral / distribute). Lead with position rather than prediction, explain any jargon in passing, stay neutral, and never give financial advice or price targets."
          prompt-file: prompt.txt
          max-tokens: 280
      - name: Write commentary.json (AI or computed fallback)
        env:
          RESPONSE: ${{ steps.ai.outputs.response }}
        run: python3 tools/write_commentary.py
      - name: Refresh music-stops live data (FRED + multpl)
        continue-on-error: true
        run: python3 dashboards/music-stops/fetch.py
      - name: Build music-stops AI prompt from live data
        run: python3 dashboards/music-stops/build_prompt.py
      - name: Generate music-stops narratives (GitHub Models)
        id: ai_music
        continue-on-error: true        # preview API — never block the deploy
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1-mini
          system-prompt: "You are a calm, plain-spoken market analyst writing for a smart but non-expert reader. Use only the numbers you are given; never invent or predict figures. Return only the requested JSON object, no markdown."
          prompt-file: dashboards/music-stops/prompt.txt
          max-tokens: 600
      - name: Write music-stops narrative.json (AI or fallback)
        env:
          RESPONSE: ${{ steps.ai_music.outputs.response }}
        run: python3 dashboards/music-stops/write_narrative.py
      - name: Commit refreshed data + SVG back to repo
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "houtini-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/btc-monthly.json btc-mandala.svg dashboards/maritime/chokepoint_deviations.json \
                  dashboards/music-stops/data/yieldcurve.json dashboards/music-stops/data/cape.json \
                  dashboards/music-stops/narrative.json
          if git diff --staged --quiet; then
            echo "no changes to commit"; exit 0
          fi
          git commit -m "chore: refresh prices + SVG + maritime data [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
